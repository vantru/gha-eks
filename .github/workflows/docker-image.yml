name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: "docker build -t hardingtrutran/gha-pyapp:${GITHUB_SHA::7} ."
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}
      - name: push docker image to docker hub
        run: "docker push hardingtrutran/gha-pyapp:${GITHUB_SHA::7}"
      - name: install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: update deployment.yaml with docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update file yaml
          yq -i '.spec.template.spec.containers[0].image = "hardingtrutran/gha-pyapp:'"${SHORT_SHA}"'"' ./k8s/pyapp.yml
      - name: commit deployment file change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply"
          git add k8s/pyapp.yml
          git commit -m "change tag sha"
          git push origin main
