name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: set short sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}
      - name: docker build image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: hardingtrutran/gha-pyapp:${{ env.SHORT_SHA }}
      - name: trivy image scans
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hardingtrutran/gha-pyapp:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: notification to slack app
        if: always()
        uses: hbfernandes/slack-action@2.1.1
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}   
        with:
          args: |
            {
              "channel": "gha-demo",
              "text": "testing slack messaging"
            }
      - name: docker push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: hardingtrutran/gha-pyapp:${{ env.SHORT_SHA }}
      - name: install yq
        uses: mikefarah/yq@v4.44.3
      - name: update deployment.yaml with docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update file yaml
          yq -i '.spec.template.spec.containers[0].image = "hardingtrutran/gha-pyapp:'"${SHORT_SHA}"'"' ./k8s/pyapp.yml
      - name: commit deployment file change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply"
          git add k8s/pyapp.yml
          git commit -m "change tag sha"
          git push origin main
